services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillanchor-api
    ports: [ "5000:5000" ]
    env_file: ./server/.env
    environment:
      - PORT=5000
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: skillanchor-web
    depends_on: [ server ]
    ports: [ "3000:3000" ]
