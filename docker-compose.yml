services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillanchor-api
    ports: [ "5000:5000" ]
    env_file: ./server/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillanchor-worker
    command: npm run worker
    env_file: ./server/.env
    environment:
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: skillanchor-web
    depends_on: [ server ]
    ports: [ "3000:3000" ]
