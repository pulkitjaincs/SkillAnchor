services:
  mongodb:
    image: mongo:8
    container_name: skillanchor-db
    ports: [ "27017:27017" ]
    volumes: [ mongo-data:/data/db ]
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skillanchor-redis
    ports: [ "6379:6379" ]
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillanchor-api
    depends_on:
      redis:
        condition: service_healthy
    ports: [ "5000:5000" ]
    env_file: ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: skillanchor-web
    depends_on: [ server ]
    ports: [ "3000:3000" ]

volumes:
  mongo-data:
